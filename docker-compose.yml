services:
  browser:
    build:
      context: ./server/browser_sidecar
    container_name: modelmirror-browser
    networks:
      - browser_egress
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5
    shm_size: 256m
    tmpfs:
      - /tmp:rw,nosuid,size=256m
      - /home/pwuser:rw,nosuid,size=128m
    environment:
      BROWSER_SOCKET_PATH: /run/modelmirror-browser/browser.sock
      BROWSER_DATA_ROOT: /browser-data
      SANDBOX_WORKSPACE_ROOT: /sandbox-workspaces
      # Docker Desktop/VPN DNS may map public hostnames into the RFC 2544 Fake-IP range.
      # Literal access to that range remains blocked by the sidecar policy.
      BROWSER_ALLOW_SYNTHETIC_DNS: "true"
    volumes:
      - browser_socket:/run/modelmirror-browser
      - browser_data:/browser-data
      - sandbox_workspaces:/sandbox-workspaces:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const n=require('net');const s=n.createConnection('/run/modelmirror-browser/browser.sock');s.on('connect',()=>s.write('{\"action\":\"health\"}\\n'));s.on('data',d=>{const x=JSON.parse(d);process.exit(x.ok?0:1)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  sandbox:
    build:
      context: ./server/sandbox_sidecar
    container_name: modelmirror-sandbox
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    tmpfs:
      - /tmp:rw,nosuid,noexec,size=64m
    volumes:
      - sandbox_socket:/run/modelmirror-sandbox
      - sandbox_workspaces:/workspaces
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,socket; s=socket.socket(socket.AF_UNIX); s.connect('/run/modelmirror-sandbox/sandbox.sock'); s.sendall(b'{\"action\":\"health\"}\\n'); assert json.loads(s.recv(4096))['ok']",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  new-api:
    image: calciumion/new-api:latest
    container_name: modelmirror-new-api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./new-api-data:/data
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/status >/dev/null 2>&1 || curl -fsS http://localhost:3000/api/status >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    build:
      context: ./server
    container_name: modelmirror-server
    depends_on:
      browser:
        condition: service_healthy
      sandbox:
        condition: service_healthy
      new-api:
        condition: service_healthy
    env_file:
      - path: ./server/.env
        required: false
    environment:
      LLM_GATEWAY_URL: http://new-api:3000/v1/chat/completions
      RAG_STORAGE_DIR: /app/rag/storage
      RAG_UPLOAD_DIR: /app/rag/uploads
      CHROMA_DB_PATH: /app/rag/storage/chroma_db
      SKILL_INSTALLED_DIR: /app/skills/installed
      SKILL_TMP_DIR: /app/skills/tmp
      XPERT_STORAGE_DIR: /app/xperts/storage
      AGENT_TASK_STORAGE_DIR: /app/xpert_runtime/storage
      HANDOFF_EXECUTOR_ENABLED: "true"
      HANDOFF_EXECUTOR_MAX_CONCURRENCY: "2"
      GOAL_COORDINATOR_ENABLED: "true"
      SANDBOX_SOCKET_PATH: /run/modelmirror-sandbox/sandbox.sock
      SANDBOX_WORKSPACE_ROOT: /app/sandbox-workspaces
      BROWSER_SOCKET_PATH: /run/modelmirror-browser/browser.sock
      BROWSER_DATA_ROOT: /app/browser-data
    ports:
      - "8000:8000"
    volumes:
      - ./server/rag/storage:/app/rag/storage
      - ./server/rag/uploads:/app/rag/uploads
      - ./server/skills/installed:/app/skills/installed
      - ./server/xperts/storage:/app/xperts/storage
      - ./server/xpert_runtime/storage:/app/xpert_runtime/storage
      - sandbox_socket:/run/modelmirror-sandbox
      - sandbox_workspaces:/app/sandbox-workspaces:ro
      - browser_socket:/run/modelmirror-browser
      - browser_data:/app/browser-data:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
    container_name: modelmirror-client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  sandbox_socket:
  sandbox_workspaces:
  browser_socket:
  browser_data:

networks:
  browser_egress:
    driver: bridge
