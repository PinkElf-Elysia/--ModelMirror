services:
  server:
    build:
      context: ./server
    container_name: modelmirror-server
    env_file:
      - ./server/.env
    environment:
      RAG_STORAGE_DIR: /app/rag/storage
      RAG_UPLOAD_DIR: /app/rag/uploads
      CHROMA_DB_PATH: /app/rag/storage/chroma_db
      SKILL_INSTALLED_DIR: /app/skills/installed
      SKILL_TMP_DIR: /app/skills/tmp
    ports:
      - "8000:8000"
    volumes:
      - ./server/rag/storage:/app/rag/storage
      - ./server/rag/uploads:/app/rag/uploads
      - ./server/skills/installed:/app/skills/installed
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
    container_name: modelmirror-client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
